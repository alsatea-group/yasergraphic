<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ياسر | مصمم جرافيك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #0f051a;
            --gold: #d4af37;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #aa771c);
            --glass-glow: rgba(212, 175, 55, 0.4);
            --silk-gold: rgba(212, 175, 55, 0.15);
        }

        /* تحسينات عامة للأداء */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Tajawal', sans-serif; 
            scroll-behavior: smooth; 
            cursor: default; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--deep-purple); 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* --- نظام خيوط الحرير المحسن (الأداء العالي) --- */
        .glass-silk-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--deep-purple) 100%);
            contain: strict; /* عزل الطبقة برمجياً لتحسين السرعة */
        }

        .fiber {
            position: absolute; 
            width: 180vw; height: 350px; 
            background: transparent;
            border-top: 1px solid var(--silk-gold);
            border-radius: 50%;
            will-change: transform; /* إخبار المتصفح بالاستعداد للأنميشن */
            transform: translate3d(0, 0, 0); /* تفعيل GPU */
            animation: luxuryWave 18s infinite ease-in-out;
            pointer-events: none;
        }
        
        /* تقليل استهلاك الرام في الجوال */
        @media (max-width: 768px) {
            .fiber:nth-child(n+12) { display: none; } /* إخفاء الخيوط الزائدة في الجوال فقط */
            .fiber { width: 250vw; opacity: 0.6; }
        }

        @keyframes luxuryWave {
            0%, 100% { transform: translate3d(-10%, 0, 0) rotate(-2deg); }
            50% { transform: translate3d(10%, 30px, 0) rotate(2deg); }
        }

        /* توزيع المسارات (تم اختصارها للأداء) */
        .fiber:nth-child(1) { top: -10%; left: -5%; animation-duration: 12s; }
        .fiber:nth-child(2) { top: 10%; right: -10%; animation-duration: 15s; }
        .fiber:nth-child(3) { top: 30%; left: -15%; animation-duration: 20s; }
        .fiber:nth-child(4) { top: 50%; right: -20%; animation-duration: 18s; }
        .fiber:nth-child(5) { top: 70%; left: -10%; animation-duration: 25s; }
        .fiber:nth-child(6) { top: 90%; right: -5%; animation-duration: 14s; }
        .fiber:nth-child(n+7) { opacity: 0.1; border-top-style: dashed; }

        /* --- الهيدر --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 8%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; background: rgba(15, 5, 26, 0.8); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .visitor-counter {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 6px 12px; border-radius: 50px; display: flex; align-items: center; gap: 8px; font-size: 0.75rem;
        }

        .pulse-dot { width: 6px; height: 6px; background-color: #2ecc71; border-radius: 50%; position: relative; }
        .pulse-dot::after { content: ''; position: absolute; width: 100%; height: 100%; background-color: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        /* --- العناوين --- */
        .section-title-container { text-align: center; margin: 60px 0 40px; position: relative; }
        .section-title-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(4rem, 15vw, 8rem); font-weight: 800; color: rgba(255, 255, 255, 0.02);
            white-space: nowrap; letter-spacing: 15px; z-index: -1;
        }
        .section-title-main { font-size: clamp(1.8rem, 8vw, 2.8rem); font-weight: 800; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- الهيرو --- */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 5%; }
        .main-logo { width: 400px; max-width: 80vw; filter: drop-shadow(0 0 30px var(--glass-glow)); animation: float 5s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- الكروت والشبكة --- */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 0 8% 100px; }
        .card-link { text-decoration: none; color: inherit; display: block; }
        .premium-card {
            position: relative; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 25px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }
        .card-link:hover .premium-card { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1); }
        .play-icon { font-size: 3rem; color: var(--gold); opacity: 0.5; }

        /* --- المدخلات --- */
        .contact-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(212,175,55,0.2); background: rgba(15, 5, 26, 0.7); color: white; outline: none; transition: 0.3s; }
        .contact-input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.1); }
        
        .social-btn { 
            width: 100%; padding: 16px; border: 1px solid var(--gold); border-radius: 50px; 
            background: transparent; color: white; font-weight: 800; cursor: pointer; transition: 0.4s;
        }
        .social-btn:hover { background: var(--gold-gradient); color: var(--deep-purple); transform: scale(1.02); }

        footer { text-align: center; padding: 40px; opacity: 0.4; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="glass-silk-container">
        <!-- الخيوط الـ 32 (تم تحسين رندر العناصر) -->
        <div class="fiber"></div><div class="fiber"></div><div class="fiber"></div><div class="fiber"></div>
        <div class="fiber"></div><div class="fiber"></div><div class="fiber"></div><div class="fiber"></div>
        <div class="fiber"></div><div class="fiber"></div><div class="fiber"></div><div class="fiber"></div>
        <div class="fiber"></div><div class="fiber"></div><div class="fiber"></div><div class="fiber"></div>
        <div class="fiber"></div><div class="fiber"></div><div class="fiber"></div><div class="fiber"></div>
        <div class="fiber"></div><div class="fiber"></div><div class="fiber"></div><div class="fiber"></div>
        <div class="fiber"></div><div class="fiber"></div><div class="fiber"></div><div class="fiber"></div>
        <div class="fiber"></div><div class="fiber"></div><div class="fiber"></div><div class="fiber"></div>
    </div>

    <nav>
        <div style="font-weight: 800; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.1rem;">YASSER GRAPHIC</div>
        <div class="visitor-counter">
            <span class="pulse-dot"></span>
            <span>متواجد الآن: <strong id="live-count" style="color: var(--gold);">84</strong></span>
        </div>
    </nav>

    <section class="hero">
        <img src="yaser-logo.png(1).png" alt="Yasser Logo" class="main-logo">
        <h1 style="font-size: clamp(1.8rem, 6vw, 3rem); margin: 20px 0; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">وجهتك الأولى في عالم التصاميم</h1>
        <p style="letter-spacing: clamp(5px, 2vw, 10px); opacity: 0.6; font-size: 0.7rem;">PREMIUM GRAPHIC DESIGNER</p>
    </section>

    <!-- قسم الطلب -->
    <section id="contact" style="padding: 40px 8%;">
        <div class="section-title-container">
            <div class="section-title-bg">ORDER</div>
            <h2 class="section-title-main">اطلب تصميمك الآن</h2>
        </div>
        <div class="premium-card" style="max-width: 600px; margin: 0 auto; padding: 30px;">
            <div style="display: grid; gap: 20px; text-align: right;">
                <div>
                    <label style="display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.9rem;">الأسم الكريم</label>
                    <input type="text" id="client_name" placeholder="أدخل اسمك هنا..." class="contact-input">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.9rem;">نوع الخدمة</label>
                    <select id="service_type" class="contact-input">
                        <option value="هوية بصرية">هوية بصرية متكاملة</option>
                        <option value="تصميم فيديو (مونتاج)">تصميم فيديو (مونتاج)</option>
                        <option value="سوشيال ميديا">تصاميم سوشيال ميديا</option>
                        <option value="شعار (لوجو)">تصميم شعار (لوجو)</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.9rem;">تفاصيل الطلب</label>
                    <textarea id="project_details" rows="4" placeholder="اشرح لنا فكرتك..." class="contact-input"></textarea>
                </div>
                <button onclick="sendToWhatsApp()" class="social-btn">إرسال عبر واتساب</button>
            </div>
        </div>
    </section>

    <!-- قسم الأعمال -->
    <section id="portfolio" style="padding-bottom: 80px;">
        <div class="section-title-container">
            <div class="section-title-bg">WORKS</div>
            <h2 class="section-title-main">التصاميم الرائجة</h2>
        </div>
        <div class="portfolio-grid">
            <a href="https://www.youtube.com/watch?v=mU_WLBcPMNI" target="_blank" class="card-link">
                <div class="premium-card">
                    <div style="height: 200px; background: rgba(255,255,255,0.01); display: flex; align-items: center; justify-content: center;">
                        <span class="play-icon">▶</span>
                    </div>
                    <div style="padding: 20px; text-align: center;">
                        <h3 style="color: var(--gold); font-size: 1.1rem;">تصميم اليوم الوطني 93</h3>
                    </div>
                </div>
            </a>
            <a href="https://www.youtube.com/watch?v=O1Gq-J76m4M" target="_blank" class="card-link">
                <div class="premium-card">
                    <div style="height: 200px; background: rgba(255,255,255,0.01); display: flex; align-items: center; justify-content: center;">
                        <span class="play-icon">▶</span>
                    </div>
                    <div style="padding: 20px; text-align: center;">
                        <h3 style="color: var(--gold); font-size: 1.1rem;">أفخم تصميم ليوم التأسيس</h3>
                    </div>
                </div>
            </a>
        </div>
    </section>

    <footer>
        © 2026 YASSER GRAPHIC | ALL RIGHTS RESERVED
    </footer>

    <script>
        // تحديث العداد بشكل سلس
        function updateVisitors() {
            const countElement = document.getElementById('live-count');
            let currentCount = parseInt(countElement.innerText);
            const change = Math.floor(Math.random() * 5) - 2;
            let newCount = currentCount + change;
            if (newCount < 65) newCount = 70;
            if (newCount > 120) newCount = 110;
            countElement.innerText = newCount;
        }
        setInterval(updateVisitors, 5000);

        // وظيفة الواتساب
        function sendToWhatsApp() {
            const phoneNumber = "966532852261";
            const name = document.getElementById('client_name').value;
            const service = document.getElementById('service_type').value;
            const details = document.getElementById('project_details').value;

            if(!name.trim() || !details.trim()) {
                alert("يا هلا بك.. يرجى كتابة الاسم والتفاصيل ليتم خدمتك.");
                return;
            }

            const message = `مرحباً أستاذ ياسر،%0aاستفسار عن طلب جديد:%0a*الأسم:* ${name}%0a*الخدمة:* ${service}%0a*التفاصيل:* ${details}`;
            window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
        }
    </script>

</body>
</html>
